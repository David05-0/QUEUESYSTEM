<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue — Counter Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;--panel:#111118;--border:#1c1c2e;--text:#eeeef6;
    --muted:#46465e;--green:#3ddc84;--red:#ff5f5f;--accent:#f0c040;
    --amber:#e2a000;--teal:#0e9ab5;
    --c1:#e67e22;--c1bg:rgba(230,126,34,0.08);--c1b:rgba(230,126,34,0.35);
    --c2:#2471a3;--c2bg:rgba(36,113,163,0.08);--c2b:rgba(36,113,163,0.35);
    --c3:#1e8449;--c3bg:rgba(30,132,73,0.08);--c3b:rgba(30,132,73,0.35);
    --c4:#7d3c98;--c4bg:rgba(125,60,152,0.08);--c4b:rgba(125,60,152,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}
  body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}

  /* ── LOGIN ── */
  #loginScreen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:32px}
  #loginScreen.hidden{display:none}
  .login-sup{font-size:10px;letter-spacing:0.3em;color:var(--accent);text-transform:uppercase;text-align:center}
  .login-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,72px);letter-spacing:0.06em;line-height:1;text-align:center}
  .login-title span{color:var(--accent)}
  .login-sub{font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;text-align:center}
  .fb-badge{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 11px;border-radius:20px;border:1px solid var(--border);color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .fb-badge.live{color:var(--green);border-color:rgba(61,220,132,0.4);background:rgba(61,220,132,0.07)}
  .fb-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
  .login-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:min(520px,90vw)}
  .counter-login-btn{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:26px 16px;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden}
  .counter-login-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s}
  .counter-login-btn[data-c="1"]{--cc:var(--c1);--ccbg:var(--c1bg);--ccb:var(--c1b)}
  .counter-login-btn[data-c="2"]{--cc:var(--c2);--ccbg:var(--c2bg);--ccb:var(--c2b)}
  .counter-login-btn[data-c="3"]{--cc:var(--c3);--ccbg:var(--c3bg);--ccb:var(--c3b)}
  .counter-login-btn[data-c="4"]{--cc:var(--c4);--ccbg:var(--c4bg);--ccb:var(--c4b)}
  .counter-login-btn::before{background:var(--ccbg)}
  .counter-login-btn:hover{border-color:var(--cc);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px var(--ccb)}
  .counter-login-btn:hover::before{opacity:1}
  .clb-number{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;letter-spacing:0.04em;color:var(--cc);position:relative;z-index:1}
  .clb-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);position:relative;z-index:1}
  .clb-count{font-size:8px;color:var(--cc);opacity:0.8;position:relative;z-index:1;border:1px solid var(--ccb);background:var(--ccbg);padding:2px 8px;border-radius:20px}

  /* ── COUNTER VIEW ── */
  #counterView{position:fixed;inset:0;z-index:5;display:none;flex-direction:column}
  #counterView.visible{display:flex}
  #counterView::before{content:'';position:absolute;inset:0;z-index:0;opacity:0;transition:opacity 1s;pointer-events:none}
  #counterView.c1::before{background:radial-gradient(ellipse at 50% 0%,rgba(230,126,34,0.07) 0%,transparent 65%);opacity:1}
  #counterView.c2::before{background:radial-gradient(ellipse at 50% 0%,rgba(36,113,163,0.07) 0%,transparent 65%);opacity:1}
  #counterView.c3::before{background:radial-gradient(ellipse at 50% 0%,rgba(30,132,73,0.07) 0%,transparent 65%);opacity:1}
  #counterView.c4::before{background:radial-gradient(ellipse at 50% 0%,rgba(125,60,152,0.07) 0%,transparent 65%);opacity:1}

  .cv-topbar{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:11px 22px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.85);backdrop-filter:blur(10px);flex-shrink:0}
  .cv-left{display:flex;align-items:center;gap:11px}
  .cv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .cv-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:0.12em}
  .cv-pill{font-size:7.5px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all 0.4s}
  .cv-pill.serving{color:var(--green);border-color:rgba(61,220,132,0.4);background:rgba(61,220,132,0.07);animation:pillPulse 2s ease infinite}
  .cv-pill.comply{color:var(--amber);border-color:rgba(226,160,0,0.4);background:rgba(226,160,0,0.08)}
  .cv-pill.payment{color:var(--teal);border-color:rgba(14,154,181,0.4);background:rgba(14,154,181,0.08)}
  @keyframes pillPulse{0%,100%{opacity:1}50%{opacity:0.55}}
  .cv-right{display:flex;align-items:center;gap:12px}
  .cv-clock{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.1em;color:var(--muted)}
  .cv-logout{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.16em;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--muted);border-radius:3px;padding:5px 11px;cursor:pointer;transition:all 0.15s}
  .cv-logout:hover{color:var(--red);border-color:var(--red)}

  /* body: main + sidebar */
  .cv-body{position:relative;z-index:1;flex:1;display:grid;grid-template-columns:1fr 290px;overflow:hidden}

  /* ── MAIN ── */
  .cv-main{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 32px;border-right:1px solid var(--border);gap:0;overflow:hidden}
  .cv-now-lbl{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .cv-big-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,17vw,190px);line-height:0.88;letter-spacing:0.02em;color:var(--muted);transition:color 0.4s,text-shadow 0.4s;text-align:center}
  .cv-big-num.pop{animation:bigPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
  @keyframes bigPop{0%{transform:scale(0.55) translateY(24px);opacity:0}60%{transform:scale(1.06) translateY(-4px);opacity:1}100%{transform:scale(1) translateY(0)}}
  #counterView.c1 .cv-big-num.has-num{color:var(--c1);text-shadow:0 0 80px rgba(230,126,34,0.4)}
  #counterView.c2 .cv-big-num.has-num{color:var(--c2);text-shadow:0 0 80px rgba(36,113,163,0.4)}
  #counterView.c3 .cv-big-num.has-num{color:var(--c3);text-shadow:0 0 80px rgba(30,132,73,0.4)}
  #counterView.c4 .cv-big-num.has-num{color:var(--c4);text-shadow:0 0 80px rgba(125,60,152,0.4)}

  .cv-ticket-info{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:12px;min-height:46px}
  .cv-svc{font-size:11px;letter-spacing:0.08em;color:var(--muted)}
  .cv-cust{font-size:16px;letter-spacing:0.05em;color:var(--text);font-weight:500}
  .cv-prio-tag{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:#e74c3c;border:1px solid rgba(231,76,60,0.4);background:rgba(231,76,60,0.08);padding:3px 8px;border-radius:20px;margin-top:2px}

  .cv-wave{display:flex;align-items:center;gap:7px;height:20px;margin-top:12px;opacity:0;transition:opacity 0.3s}
  .cv-wave.active{opacity:1}
  .cv-wave-lbl{font-size:8px;letter-spacing:0.16em;text-transform:uppercase}
  #counterView.c1 .cv-wave-lbl{color:var(--c1)} #counterView.c2 .cv-wave-lbl{color:var(--c2)}
  #counterView.c3 .cv-wave-lbl{color:var(--c3)} #counterView.c4 .cv-wave-lbl{color:var(--c4)}
  .wave-bars{display:flex;gap:2px;align-items:flex-end}
  .wave-bars span{display:block;width:3px;border-radius:1px;animation:barWave 0.9s ease infinite}
  #counterView.c1 .wave-bars span{background:var(--c1)} #counterView.c2 .wave-bars span{background:var(--c2)}
  #counterView.c3 .wave-bars span{background:var(--c3)} #counterView.c4 .wave-bars span{background:var(--c4)}
  .wave-bars span:nth-child(1){height:5px}.wave-bars span:nth-child(2){height:12px;animation-delay:0.14s}.wave-bars span:nth-child(3){height:18px;animation-delay:0.26s}.wave-bars span:nth-child(4){height:10px;animation-delay:0.09s}.wave-bars span:nth-child(5){height:7px;animation-delay:0.2s}
  @keyframes barWave{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}

  /* Call button */
  .cv-call-btn{margin-top:28px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.12em;border:none;border-radius:6px;padding:18px 52px;cursor:pointer;transition:all 0.15s;width:min(380px,100%)}
  #counterView.c1 .cv-call-btn{background:var(--c1);color:#fff}
  #counterView.c2 .cv-call-btn{background:var(--c2);color:#fff}
  #counterView.c3 .cv-call-btn{background:var(--c3);color:#fff}
  #counterView.c4 .cv-call-btn{background:var(--c4);color:#fff}
  .cv-call-btn:hover:not(:disabled){filter:brightness(1.14);transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,0.5)}
  .cv-call-btn:disabled{opacity:0.2;cursor:not-allowed;transform:none;box-shadow:none;filter:none}

  /* ── SIDEBAR ── */
  .cv-sidebar{display:flex;flex-direction:column;overflow:hidden;background:rgba(10,10,15,0.3)}
  .cv-sec{padding:13px 16px;border-bottom:1px solid var(--border)}
  .cv-sec:last-child{border-bottom:none;flex:1;overflow:hidden;display:flex;flex-direction:column}
  .cv-sec-title{font-size:7.5px;letter-spacing:0.26em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .cv-sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .cv-stats-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .cv-stat{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:9px 10px}
  .cv-stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;letter-spacing:0.04em}
  .cv-stat-lbl{font-size:7px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-top:1px}

  /* ── HOLD ZONES ── */
  .hold-zones{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
  .hold-zone{border:1.5px dashed var(--border);border-radius:3px;padding:7px 8px;min-height:50px;display:flex;flex-direction:column;gap:4px;transition:all 0.2s}
  .hold-zone.drag-over-comply{border-color:var(--amber);background:rgba(226,160,0,0.06)}
  .hold-zone.drag-over-payment{border-color:var(--teal);background:rgba(14,154,181,0.06)}
  .hz-label{font-size:7px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:3px;flex-shrink:0}
  .hz-label.comply-lbl{color:var(--amber)}
  .hz-label.payment-lbl{color:var(--teal)}
  .hz-chips{display:flex;flex-wrap:wrap;gap:4px}
  .hz-chip{font-family:'Bebas Neue',sans-serif;font-size:12px;padding:2px 7px;border-radius:2px;cursor:grab;user-select:none;animation:popIn 0.18s ease;transition:opacity 0.15s;display:inline-flex;align-items:center;gap:2px}
  .hz-chip:active{cursor:grabbing;opacity:0.6}
  .hz-chip.dragging{opacity:0.3}
  .hz-chip.comply-chip{background:rgba(226,160,0,0.1);color:var(--amber);border:1px solid rgba(226,160,0,0.3)}
  .hz-chip.payment-chip{background:rgba(14,154,181,0.1);color:var(--teal);border:1px solid rgba(14,154,181,0.3)}
  .hz-empty{font-size:8px;color:var(--muted);letter-spacing:0.08em}

  /* ── QUEUE LIST ── */
  .cv-queue-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:6px}
  .cv-q-item{display:flex;align-items:center;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:3px;gap:8px;animation:slideIn 0.2s ease;cursor:grab;user-select:none;transition:all 0.15s}
  .cv-q-item:hover{border-color:var(--muted)}
  .cv-q-item:active{cursor:grabbing;opacity:0.6}
  .cv-q-item.dragging{opacity:0.35}
  .cv-q-item.next-up{border-left:2px solid}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
  #counterView.c1 .cv-q-item.next-up{border-left-color:var(--c1)}
  #counterView.c2 .cv-q-item.next-up{border-left-color:var(--c2)}
  #counterView.c3 .cv-q-item.next-up{border-left-color:var(--c3)}
  #counterView.c4 .cv-q-item.next-up{border-left-color:var(--c4)}
  .cv-q-num{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.04em}
  .cv-q-item.next-up .cv-q-num{color:var(--text)} .cv-q-item:not(.next-up) .cv-q-num{color:var(--muted)}
  .cv-q-info{flex:1;overflow:hidden}
  .cv-q-svc{font-size:8.5px;letter-spacing:0.06em;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cv-q-cust{font-size:10px;letter-spacing:0.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cv-q-badge{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 5px;border-radius:20px;flex-shrink:0}
  .next-badge{border:1px solid;animation:nextGlow 2s ease infinite}
  #counterView.c1 .next-badge{color:var(--c1);border-color:var(--c1b);background:var(--c1bg)}
  #counterView.c2 .next-badge{color:var(--c2);border-color:var(--c2b);background:var(--c2bg)}
  #counterView.c3 .next-badge{color:var(--c3);border-color:var(--c3b);background:var(--c3bg)}
  #counterView.c4 .next-badge{color:var(--c4);border-color:var(--c4b);background:var(--c4bg)}
  @keyframes nextGlow{0%,100%{opacity:1}50%{opacity:0.55}}
  .prio-badge{color:#e74c3c;border:1px solid rgba(231,76,60,0.3);background:rgba(231,76,60,0.08)}
  .cv-q-empty{font-size:10px;letter-spacing:0.08em;color:var(--muted);text-align:center;padding:18px 0}

  /* History */
  .hist-chips{display:flex;flex-wrap:wrap;gap:4px}
  .hist-chip{font-family:'Bebas Neue',sans-serif;font-size:13px;padding:2px 7px;border-radius:2px;background:var(--panel);border:1px solid var(--border);color:var(--muted);text-decoration:line-through;opacity:0.5;animation:popIn 0.2s ease}
  @keyframes popIn{from{transform:scale(0.82);opacity:0}to{transform:scale(1);opacity:1}}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 22px;border-radius:3px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.1em;opacity:0;transition:all 0.3s;pointer-events:none;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div>
    <div class="login-sup">Counter Staff Login</div>
    <div class="login-title">QUEUE<span>SYS</span></div>
    <div class="login-sub">Select your counter</div>
  </div>
  <div><span class="fb-badge" id="fbBadge"><span class="fb-dot"></span>Connecting…</span></div>
  <div class="login-grid" id="loginGrid"></div>
</div>

<!-- COUNTER VIEW -->
<div id="counterView">
  <div class="cv-topbar">
    <div class="cv-left">
      <div class="cv-dot" id="cvDot"></div>
      <div class="cv-name" id="cvName">Counter 1</div>
      <div class="cv-pill" id="cvPill">Idle</div>
    </div>
    <div class="cv-right">
      <span class="fb-badge live" id="cvFbBadge"><span class="fb-dot"></span>Live</span>
      <div class="cv-clock" id="cvClock">00:00:00</div>
      <button class="cv-logout" onclick="logout()">← Change</button>
    </div>
  </div>

  <div class="cv-body">
    <!-- MAIN -->
    <div class="cv-main">
      <div class="cv-now-lbl">Now Serving</div>
      <div class="cv-big-num" id="cvBigNum">—</div>
      <div class="cv-ticket-info">
        <div class="cv-svc" id="cvSvc"></div>
        <div class="cv-cust" id="cvCust"></div>
        <div id="cvPrioTag"></div>
      </div>
      <div class="cv-wave" id="cvWave">
        <div class="wave-bars"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="cv-wave-lbl">Announcing</div>
      </div>
      <button class="cv-call-btn" id="cvCallBtn" onclick="callNext()" disabled>▶ CALL NEXT</button>
    </div>

    <!-- SIDEBAR -->
    <div class="cv-sidebar">

      <!-- Stats -->
      <div class="cv-sec">
        <div class="cv-sec-title">Stats</div>
        <div class="cv-stats-row">
          <div class="cv-stat"><div class="cv-stat-val" id="cvStatWaiting">0</div><div class="cv-stat-lbl">In Queue</div></div>
          <div class="cv-stat"><div class="cv-stat-val" id="cvStatServed">0</div><div class="cv-stat-lbl">Served</div></div>
        </div>
      </div>

      <!-- Hold zones -->
      <div class="cv-sec">
        <div class="cv-sec-title">Hold Zones <span style="font-size:6.5px;color:var(--muted);letter-spacing:0.08em">DRAG TICKET HERE · DRAG BACK TO RE-QUEUE</span></div>
        <div class="hold-zones">
          <!-- Compliance Hold -->
          <div class="hold-zone" id="complyZone"
            ondragover="onHoldDragOver(event,'comply')"
            ondragleave="onHoldDragLeave(event,'comply')"
            ondrop="onHoldDrop(event,'comply')">
            <div class="hz-label comply-lbl">⏸ Compliance</div>
            <div class="hz-chips" id="complyChips">
              <span class="hz-empty" id="complyEmpty">Drop here</span>
            </div>
          </div>
          <!-- Payment Hold -->
          <div class="hold-zone" id="paymentZone"
            ondragover="onHoldDragOver(event,'payment')"
            ondragleave="onHoldDragLeave(event,'payment')"
            ondrop="onHoldDrop(event,'payment')">
            <div class="hz-label payment-lbl">💳 Payment</div>
            <div class="hz-chips" id="paymentChips">
              <span class="hz-empty" id="paymentEmpty">Drop here</span>
            </div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="cv-sec">
        <div class="cv-sec-title">Called</div>
        <div class="hist-chips" id="cvHistChips"><span style="font-size:10px;color:var(--muted)">None yet</span></div>
      </div>

      <!-- Queue list (draggable to hold zones) -->
      <div class="cv-sec">
        <div class="cv-sec-title">My Queue <span style="font-size:6.5px;color:var(--muted);letter-spacing:0.07em">DRAG → HOLD ZONE</span></div>
        <div class="cv-queue-list" id="cvQueueList"
          ondragover="onQueueDragOver(event)"
          ondragleave="onQueueDragLeave(event)"
          ondrop="onQueueDrop(event)">
          <div class="cv-q-empty">No tickets assigned</div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyD1jlmo6pdJhqwjbRDMby9cTBHzazRejcE",
  authDomain:"queuesystem-fe374.firebaseapp.com",
  databaseURL:"https://queuesystem-fe374-default-rtdb.firebaseio.com",
  projectId:"queuesystem-fe374",
  storageBucket:"queuesystem-fe374.firebasestorage.app",
  messagingSenderId:"314957208142",
  appId:"1:314957208142:web:51f960c760f8682e77811f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const stateRef = ref(db,'queueState');

const COUNTER_NAMES = ['Counter 1','Counter 2','Counter 3','Counter 4'];
const COLOR_HEX = {1:'#e67e22',2:'#2471a3',3:'#1e8449',4:'#7d3c98'};

let activeCounter = null;
let sharedLog = [];
let sharedTicketCounter = 0;
let myHistory  = [];
let myServed   = 0;
let lastResetFlag = null;
let dragId = null;

// ── Clock ──
function updateClock(){
  const n=new Date();
  document.getElementById('cvClock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}
setInterval(updateClock,1000); updateClock();

// ── Firebase ──
onValue(stateRef,snap=>{
  document.getElementById('fbBadge').className='fb-badge live';
  document.getElementById('fbBadge').innerHTML='<span class="fb-dot"></span>Firebase Connected';
  const data=snap.val()||{};
  const newReset=data.resetFlag||null;
  if(newReset&&newReset!==lastResetFlag){
    lastResetFlag=newReset;
    sharedLog=[]; sharedTicketCounter=0; myHistory=[]; myServed=0;
    clearDisplay(); showToast('↺ Queue reset by admin');
  } else {
    sharedLog=data.log||[];
    sharedTicketCounter=data.ticketCounter||0;
  }
  lastResetFlag=newReset;
  refreshLoginCounts();
  if(activeCounter) renderView();
},()=>{
  document.getElementById('fbBadge').className='fb-badge';
  document.getElementById('fbBadge').innerHTML='<span class="fb-dot"></span>Offline';
});

function saveSharedState(){
  set(stateRef,{ticketCounter:sharedTicketCounter,log:sharedLog,lastUpdate:Date.now(),resetFlag:lastResetFlag});
}

// "active queue" = not served AND not on any hold, assigned to me
function getMyQueue(){
  return sharedLog
    .filter(t=>!t.served&&!t.compliance&&!t.paymentHold&&t.counter===activeCounter)
    .sort((a,b)=>a.priority===b.priority?a.id-b.id:a.priority==='priority'?-1:1);
}
function getMyComply(){
  return sharedLog.filter(t=>t.compliance&&!t.served&&t.counter===activeCounter);
}
function getMyPayment(){
  return sharedLog.filter(t=>t.paymentHold&&!t.served&&t.counter===activeCounter);
}

// ── Login ──
function buildLogin(){
  const grid=document.getElementById('loginGrid');
  grid.innerHTML='';
  [1,2,3,4].forEach(id=>{
    const q=sharedLog.filter(t=>!t.served&&!t.compliance&&!t.paymentHold&&t.counter===id).length;
    const btn=document.createElement('button');
    btn.className='counter-login-btn'; btn.dataset.c=id;
    btn.innerHTML=`<div class="clb-number" style="color:${COLOR_HEX[id]}">${id}</div>
      <div class="clb-label">${COUNTER_NAMES[id-1]}</div>
      <div class="clb-count" style="color:${COLOR_HEX[id]};border-color:${COLOR_HEX[id]}44;background:${COLOR_HEX[id]}12">${q} in queue</div>`;
    btn.onclick=()=>login(id);
    grid.appendChild(btn);
  });
}

function refreshLoginCounts(){
  [1,2,3,4].forEach(id=>{
    const el=document.getElementById(`lq-${id}`);
    if(el) el.textContent=`${sharedLog.filter(t=>!t.served&&!t.compliance&&!t.paymentHold&&t.counter===id).length} in queue`;
  });
}

function login(id){
  activeCounter=id; myHistory=[]; myServed=0;
  const view=document.getElementById('counterView');
  view.className=`visible c${id}`;
  document.getElementById('cvName').textContent=COUNTER_NAMES[id-1];
  document.getElementById('cvDot').style.background=COLOR_HEX[id];
  document.getElementById('loginScreen').classList.add('hidden');
  clearDisplay();
  renderView();
}

function logout(){
  activeCounter=null;
  document.getElementById('counterView').classList.remove('visible');
  document.getElementById('loginScreen').classList.remove('hidden');
  window.speechSynthesis&&window.speechSynthesis.cancel();
  buildLogin();
}
window.logout=logout;

function clearDisplay(){
  document.getElementById('cvBigNum').textContent='—';
  document.getElementById('cvBigNum').className='cv-big-num';
  document.getElementById('cvSvc').textContent='';
  document.getElementById('cvCust').textContent='';
  document.getElementById('cvPrioTag').innerHTML='';
  document.getElementById('cvPill').textContent='Idle';
  document.getElementById('cvPill').className='cv-pill';
  document.getElementById('cvWave').classList.remove('active');
}

// ── Call next ──
// A ticket is "callable" if it's in queue (not served, not on hold).
// Dragging a held ticket back to queue marks it unserved + clears holds,
// so the counter can call it exactly once more.
function callNext(){
  const q=getMyQueue();
  if(!q.length) return;
  const ticket=q[0];
  const entry=sharedLog.find(t=>t.id===ticket.id);
  if(entry){
    entry.served=true;
    entry.compliance=false;
    entry.paymentHold=false;
  }
  saveSharedState();
  myHistory.unshift(ticket.id);
  if(myHistory.length>6) myHistory.pop();
  myServed++;

  const numEl=document.getElementById('cvBigNum');
  numEl.textContent=String(ticket.id).padStart(3,'0');
  numEl.className='cv-big-num has-num pop';
  setTimeout(()=>numEl.classList.remove('pop'),700);

  document.getElementById('cvSvc').textContent=ticket.service||'';
  document.getElementById('cvCust').textContent=ticket.customer||'';
  document.getElementById('cvPrioTag').innerHTML=ticket.priority==='priority'
    ?'<div class="cv-prio-tag">⚡ Priority</div>':'';
  document.getElementById('cvPill').textContent='Serving';
  document.getElementById('cvPill').className='cv-pill serving';

  renderView();
  showToast(`Calling #${String(ticket.id).padStart(3,'0')}`);
}
window.callNext=callNext;

// ── Drag: queue item → hold zone ──
window.startQDrag=function(e,id){
  dragId=id; e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
};
window.endQDrag=function(e){
  e.currentTarget.classList.remove('dragging');
};

// ── Drag: hold chip → queue drop zone ──
window.startHoldDrag=function(e,id){
  dragId=id; e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
};
window.endHoldDrag=function(e){
  e.currentTarget.classList.remove('dragging');
};

// Drop onto a hold zone (from queue list OR from the other hold zone)
window.onHoldDragOver=function(e,type){
  e.preventDefault();
  document.getElementById(type==='comply'?'complyZone':'paymentZone')
    .classList.add(`drag-over-${type}`);
};
window.onHoldDragLeave=function(e,type){
  document.getElementById(type==='comply'?'complyZone':'paymentZone')
    .classList.remove(`drag-over-${type}`);
};
window.onHoldDrop=function(e,type){
  e.preventDefault();
  document.getElementById(type==='comply'?'complyZone':'paymentZone')
    .classList.remove(`drag-over-${type}`);
  if(dragId===null) return;
  const ticket=sharedLog.find(t=>t.id===dragId);
  if(!ticket) return;
  // Works whether ticket is currently in queue OR already served
  ticket.compliance  = (type==='comply');
  ticket.paymentHold = (type==='payment');
  // If it was served, un-serve it so it can be called again
  if(ticket.served) ticket.served=false;
  saveSharedState();
  const label=type==='comply'?'Compliance Hold':'Payment Hold';
  showToast(`#${String(ticket.id).padStart(3,'0')} → ${label}`);
  updatePill(ticket);
  renderView();
  dragId=null;
};

// Drop back onto queue list (from hold chip)
window.onQueueDragOver=function(e){
  e.preventDefault();
  e.currentTarget.style.outline='1px dashed var(--muted)';
};
window.onQueueDragLeave=function(e){
  e.currentTarget.style.outline='';
};
window.onQueueDrop=function(e){
  e.preventDefault();
  e.currentTarget.style.outline='';
  if(dragId===null) return;
  const ticket=sharedLog.find(t=>t.id===dragId);
  if(!ticket) return;
  // Return to queue: clear all holds and un-serve
  ticket.compliance=false;
  ticket.paymentHold=false;
  ticket.served=false;
  saveSharedState();
  showToast(`#${String(ticket.id).padStart(3,'0')} → Back in queue`);
  document.getElementById('cvPill').textContent='Idle';
  document.getElementById('cvPill').className='cv-pill';
  renderView();
  dragId=null;
};

// update topbar pill based on current ticket state
function updatePill(ticket){
  const pill=document.getElementById('cvPill');
  if(ticket.compliance){ pill.textContent='Compliance'; pill.className='cv-pill comply'; }
  else if(ticket.paymentHold){ pill.textContent='Payment'; pill.className='cv-pill payment'; }
}

// ── Render ──
function renderView(){
  if(!activeCounter) return;
  const q=getMyQueue();
  const comply=getMyComply();
  const payment=getMyPayment();

  document.getElementById('cvStatWaiting').textContent=q.length;
  document.getElementById('cvStatServed').textContent=myServed;

  // Call button
  const btn=document.getElementById('cvCallBtn');
  btn.disabled=q.length===0;
  btn.textContent=q.length>0
    ?`▶ CALL #${String(q[0].id).padStart(3,'0')}${q[0].priority==='priority'?' ⚡':''}`
    :'▶ CALL NEXT';

  // Queue list
  const listEl=document.getElementById('cvQueueList');
  listEl.innerHTML='';
  if(!q.length){ listEl.innerHTML='<div class="cv-q-empty">No tickets in queue</div>'; }
  else q.forEach((t,i)=>{
    const item=document.createElement('div');
    item.className='cv-q-item'+(i===0?' next-up':'');
    item.setAttribute('draggable','true');
    item.setAttribute('ondragstart',`startQDrag(event,${t.id})`);
    item.setAttribute('ondragend','endQDrag(event)');
    item.title='Drag to Compliance or Payment Hold';
    const badges=[];
    if(i===0) badges.push(`<span class="cv-q-badge next-badge">Next</span>`);
    if(t.priority==='priority') badges.push(`<span class="cv-q-badge prio-badge">⚡</span>`);
    item.innerHTML=`<div class="cv-q-num">${String(t.id).padStart(3,'0')}</div>
      <div class="cv-q-info">
        <div class="cv-q-svc">${t.service||''}</div>
        ${t.customer?`<div class="cv-q-cust">${t.customer}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">${badges.join('')}</div>`;
    listEl.appendChild(item);
  });

  // Compliance hold chips
  renderHoldZone('comply',comply,'complyChips','complyEmpty','comply-chip');
  renderHoldZone('payment',payment,'paymentChips','paymentEmpty','payment-chip');

  // History
  const histEl=document.getElementById('cvHistChips');
  histEl.innerHTML=myHistory.length===0
    ?'<span style="font-size:10px;color:var(--muted)">None yet</span>'
    :myHistory.map(n=>`<span class="hist-chip">${String(n).padStart(3,'0')}</span>`).join('');
}

function renderHoldZone(type,tickets,chipsId,emptyId,chipClass){
  const chipsEl=document.getElementById(chipsId);
  const emptyEl=document.getElementById(emptyId);
  chipsEl.querySelectorAll('.hz-chip').forEach(e=>e.remove());
  if(!tickets.length){ emptyEl.style.display='inline'; return; }
  emptyEl.style.display='none';
  tickets.forEach(t=>{
    const chip=document.createElement('span');
    chip.className=`hz-chip ${chipClass}`;
    chip.setAttribute('draggable','true');
    chip.setAttribute('ondragstart',`startHoldDrag(event,${t.id})`);
    chip.setAttribute('ondragend','endHoldDrag(event)');
    chip.title=`${t.service}${t.customer?' · '+t.customer:''} — drag back to queue to re-call once`;
    chip.textContent=`${String(t.id).padStart(3,'0')}${t.priority==='priority'?'⚡':''}`;
    chipsEl.insertBefore(chip,emptyEl);
  });
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

buildLogin();
</script>
</body>
</html>
